cluster:
  num_nodes: 4
  base_port: 8250
  sglang_base_port: 9250

network:
  lan_delay_ms: 2.0
  delay_jitter_ms: 0.5

run:
  overwrite_existing: true

router:
  policy: "cache_aware"
  routing_enabled: false
  snapshot_poll_interval_s: 2.0
  local_snapshot_settle_timeout_s: 0
  local_snapshot_settle_poll_s: 0.01

sglang:
  model_path: "Qwen/Qwen2.5-0.5B-Instruct"
  python_executable: "python"
  gpu_id: 3
  tp_size: 1
  mem_fraction_static: 0.05
  context_length: 8192
  temperature: 0.0
  max_tokens: 1
  startup_timeout_s: 600.0
  enable_metrics: true
  # When true, report the proxy prefill-based inference time instead of the
  # actual measured SGLang inference wall-clock time.
  use_proxy_inference_time: true
  log_dir: "runs/sglang_logs"
  use_local_checkout: true

requests:
  csv_path: "requests.csv"
  keep_running_after_demo: false
