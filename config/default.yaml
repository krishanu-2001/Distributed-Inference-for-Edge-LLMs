cluster:
  num_nodes: 4
  base_port: 8100

network:
  lan_delay_ms: 2.0
  delay_jitter_ms: 0.5

node:
  max_tokens: 1000
  eviction_policy: "lru"

llm:
  prefill_cost_factor: 0.0001
  decode_cost_factor: 0.001
  max_output_tokens: 20

router:
  policy: "cache_aware"

broadcast:
  trigger: "queue_length"
  queue_threshold: 3
  interval_s: 5.0
